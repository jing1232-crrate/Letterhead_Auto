<!DOCTYPE html>

<html lang="en">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letter Editor</title>

<link rel="stylesheet" href="css/style.css">

</head>



<body>


<section class="editor">


<!-- LEFT CONTROL PANEL -->

<div class="input-area">


<button 
class="back-btn"
onclick="backHome()">

← Back to Templates

</button>



<h2>Create Letter</h2>

<label>
Recipient Name / Company
</label>

<input
type="text"
id="recipient">



<label>
Address Line 1
</label>

<input
type="text"
id="address1">



<label>
Address Line 2
</label>

<input
type="text"
id="address2">



<label>
Postcode
</label>

<input
type="text"
id="postcode">



<label>
City
</label>

<input
type="text"
id="city">



<label>
Country
</label>

<input
type="text"
id="country">



<label>
Prepared By
</label>

<input
type="text"
id="prepared">



<button onclick="generateLetter()">

Update Letter

</button>

<button onclick="downloadPDF()">

Download PDF

</button>


</div>







<!-- RIGHT PREVIEW -->

<div class="preview">


<div class="paper">



<!-- COMPANY HEADER -->


<div class="letter-header">


<img
src="image/logo.png"
class="letter-logo">



<div class="company">


<h3>
NOVA WEALTH MANAGEMENT
</h3>


<p>

7-7, 7th Floor, The Boulevard,<br>

Mid Valley City,<br>

Lingkaran Syed Putra,<br>

59200 Kuala Lumpur.

</p>


</div>


</div>




<hr>






<!-- CUSTOMER ADDRESS + DATE -->


<div class="letter-info">



<div class="recipient-box">


<p id="previewRecipient">

Recipient Name

</p>



<p id="previewAddress">

Address Line 1<br>

Address Line 2<br>

Postcode City<br>

Country


</p>



</div>





<p id="date">

Date

</p>




</div>







<!-- LETTER CONTENT -->


<h2 
id="previewTitle" 
contenteditable="true">

Letter Title

</h2>



<div 
id="previewContent" 
contenteditable="true">

Dear Sir/Madam,

<br><br>

Write your letter content here...

</div>
<!-- SIGNATURE -->


<div class="sign">
Regards,
<br><br><br>
<span id="previewPrepared">
Name
</span>



</div>




</div>


</div>



</section>
<script src="js/html2pdf.bundle.min.js"></script>

<script src="js/script.js"></script>


</body>


</html>
